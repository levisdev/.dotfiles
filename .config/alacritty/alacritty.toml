[font]
size = 11.0

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

[font.bold_italic]
family = "Hack Nerd Font"
style = "Bold Italic"

# Colors (One Dark)
[colors.primary]
background = "#1f2329"
foreground = "#a0a8b7"

[colors.normal]
black   = "#0e1013"
red     = "#e55561"
green   = "#8ebd6b"
yellow  = "#e2b86b"
blue    = "#4fa6ed"
magenta = "#cc9057"
cyan    = "#48b0bd"
white   = "#abb2bf"

[window.padding]
x = 8
y = 5
